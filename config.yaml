source:
  type: filesystem
  params:
    path: "./sample_tests"
    filter: ".py"

model:
  threshold: 0.7

# Execution history (optional)
# Point to a directory of previous run reports OR a single report file.
# Supported formats: JUnit XML, Robot Framework output.xml, MTR .result/.summary, CSV
# Leave path empty to skip history-based features.
history:
  path: "data/reports/pytest/"
  # Directory of multiple run reports (recommended):
  # path: "data/reports/"
  #
  # Single report file:
  # path: "data/reports/run_01.xml"
  # path: "data/reports/output.xml"
  # path: "data/reports/suite.result"
  # path: "data/execution_history.csv"

# Bug system integration (optional)
bugsystem:
  type: "none"
  params: {}
  # Future example for Jira:
  # type: "jira"
  # params:
  #   url: "https://your-org.atlassian.net"
  #   project_key: "QA"
  #   api_token: "your-token"
